<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code City</title>

    <!-- Load A-Frame library -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <!-- Load Three.js and OBJLoader (for model loading) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/loaders/OBJLoader.js"></script>

    <script src="intro.js" defer></script>
    <script src="script.js" defer></script>

</head>
<body>
    <a-scene>
        <!-- Player Camera -->
        <a-entity position="0 1.6 0">
            <a-camera></a-camera>
        </a-entity>

        <!-- City Ground -->
        <a-plane src="url(models/textures/ground.jpg)"position="0 0 0" rotation="-90 0 0" width="50" height="50"></a-plane>

        <!--Sky-->
        <a-sky src="url(models/textures/sky.jpg)"></a-sky>


        <!-- Weir Hall -->
        <a-entity id="weir" obj-model="obj: url(models/weir.obj); mtl: url(models/weir.mtl)" scale="10 10 10" position="0 0 -10"></a-entity>

    </a-scene>
</body>
</html>

<script>
    const loader = new THREE.OBJLoader();
    loader.load('models/weir.obj', function (object) {
        console.log('Model loaded');
    }, undefined, function (error) {
        console.error('Error loading model:', error);
    });

    // Your player script could be handled within the A-Frame scene itself or via a script
    document.addEventListener("DOMContentLoaded", function () {
        console.log("Game Loaded");

        // Create a player entity dynamically with movement controls in A-Frame
        let scene = document.querySelector("a-scene");

        let player = document.createElement("a-entity");
        player.setAttribute("position", "0 1.6 0");
        player.setAttribute("movement-controls", "");
        player.setAttribute("wasd-controls", "");
        player.innerHTML = `<a-camera></a-camera>`; 

        scene.appendChild(player);
    });
</script>
