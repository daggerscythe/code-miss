<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code City</title>

    <!-- Load A-Frame library -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <!-- Load Three.js and OBJLoader (for model loading) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/loaders/OBJLoader.js"></script>

    <script src="script.js" defer></script>
</head>
<body>
    <a-scene>
        <!-- Player Camera -->
        <a-entity position="0 1.6 0">
            <a-camera></a-camera>
        </a-entity>

        <!-- City Ground -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="50" height="50" color="gray"></a-plane>

        <!-- Building -->
        <!-- <a-box position="0 2 -5" width="3" height="4" depth="3" color="blue"></a-box> -->

        <!-- Model Loader Script -->
        <a-entity id="cityblock1" obj-model="obj: url(models/cityblock1.obj)" scale="0.05, 0.05, 0.05" rotation="0 90 90"></a-entity>

    </a-scene>
</body>
</html>

<script>
    // This part is to load and add a 3D model using OBJLoader (not needed for simple A-Frame usage)
    // If you plan on using Three.js for advanced loading, it would go here, but A-Frame's obj-model component already handles it

    const loader = new THREE.OBJLoader();
    loader.load('models/cityblock1.obj', function (object) {
        // If you're manually using Three.js, you'd need to add the object to a Three.js scene
        // However, A-Frame will handle the model directly if you use the `obj-model` component
        console.log('Model loaded');
    }, undefined, function (error) {
        console.error('Error loading model:', error);
    });

    // Your player script could be handled within the A-Frame scene itself or via a script
    document.addEventListener("DOMContentLoaded", function () {
        console.log("Game Loaded");

        // Create a player entity dynamically with movement controls in A-Frame
        let scene = document.querySelector("a-scene");

        let player = document.createElement("a-entity");
        player.setAttribute("position", "0 1.6 0");
        player.setAttribute("movement-controls", "");
        player.setAttribute("wasd-controls", "");
        player.innerHTML = `<a-camera></a-camera>`; 

        scene.appendChild(player);
    });
</script>
