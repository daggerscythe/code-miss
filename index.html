<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code City</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }

      /* UI Styling - Enhanced */
      #timer {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 2em;
        color: #fff;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        z-index: 1000;
        font-family: "Orbitron", sans-serif;
        background-color: rgba(0, 0, 0, 0.5);
        padding: 10px 20px;
        border-radius: 10px;
        border: 2px solid #4cc3d9;
      }

      #joinedCounter {
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 1.5em;
        color: #fff;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        z-index: 1000;
        font-family: "Orbitron", sans-serif;
        background-color: rgba(0, 0, 0, 0.5);
        padding: 10px 20px;
        border-radius: 10px;
        border: 2px solid #4cc3d9;
      }

      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 12px;
        height: 12px;
        background-color: transparent;
        border: 2px solid white;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        z-index: 1000;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
      }

      #crosshair::before,
      #crosshair::after {
        content: "";
        position: absolute;
        background-color: white;
      }

      #crosshair::before {
        width: 2px;
        height: 8px;
        top: 2px;
        left: 5px;
      }

      #crosshair::after {
        width: 8px;
        height: 2px;
        top: 5px;
        left: 2px;
      }

      /* Text bubble styling */
      .text-bubble {
        position: absolute;
        background-color: rgba(255, 255, 255, 0.9);
        border-radius: 10px;
        padding: 15px;
        font-family: "Comic Sans MS", cursive;
        color: #333;
        max-width: 200px;
        text-align: center;
        transform: translate(-50%, -120%);
        z-index: 1001;
        pointer-events: none;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        border: 2px solid #4cc3d9;
      }

      .text-bubble:after {
        content: "";
        position: absolute;
        bottom: -12px;
        left: 50%;
        margin-left: -10px;
        border-width: 12px 10px 0;
        border-style: solid;
        border-color: #4cc3d9 transparent;
      }
    </style>

    <!-- Add Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>

    <script src="characterInteraction.js"></script>
    <script src="intro.js" defer></script>
    <script src="gameLogic.js"></script>
  </head>
  <body>
    <div id="timer">Time Left: 180s</div>
    <div id="joinedCounter">People Joined: 0/5</div>
    <div id="crosshair"></div>
    <a-scene
      physics="debug: false; gravity: -9.8; iterations: 10;"
      renderer="antialias: true; physicallyCorrectLights: true; gammaOutput: true; exposure: 1.2;"
    >
      <!-- Player Camera with Proper Controls -->
      <a-entity
        id="player"
        movement-controls="speed: 0.3; constrainToNavMesh: false;"
        wasd-controls="acceleration: 20;"
        dynamic-body="mass: 1; height: 2; linearDamping: 0; angularDamping: 0;">
        <a-entity
          id="camera"
          position="0 1.6 0"
          camera="fov: 80; active: true;"
          look-controls="pointerLockEnabled: true; reverseMouseDrag: false"
          raycaster="objects: .clickable; far: 15; direction: 0 0 -1;"
          cursor="rayOrigin: mouse; fuse: false"
        ></a-entity>
      </a-entity>

      <!-- Lighting for better visibility -->
      <a-entity light="type: ambient; color: #BBB; intensity: 0.8"></a-entity>
      <a-entity
        light="type: directional; color: #FFF; intensity: 1.2; castShadow: true"
        position="1 1 1"
      ></a-entity>
      <a-entity
        light="type: point; color: #FFF; intensity: 0.8"
        position="0 2.5 0"
      ></a-entity>

      <!-- Fade Overlay -->
      <a-entity
        id="fadeOverlay"
        geometry="primitive: plane; width: 10; height: 10"
        material="color: black; opacity: 1; transparent: true;"
        position="0 2 -1"
      ></a-entity>

      <!-- Game Title Text (Initially Hidden) -->
      <a-text
        id="gameTitle"
        value="CODE CITY"
        position="0 2 -2"
        color="white"
        anchor="center"
        scale="2 2 2"
        visible="true"
      >
      </a-text>

      <!--Sky-->
      <a-sky id="sky" src="url(models/textures/sky.jpg)"></a-sky>

      <!-- City Ground (This will be removed later) -->
      <a-plane
        id="ground"
        src="url(models/textures/ground.jpg)"
        position="0 0 0"
        rotation="-90 0 0"
        width="50"
        height="50"
        static-body="mass: 0"
      ></a-plane>

      <!-- Old Model (Weir Hall) -->
      <a-entity
        id="weir"
        obj-model="obj: url(models/weir.obj); mtl: url(models/weir.mtl)"
        scale="10 10 10"
        position="0 0 -10"
      ></a-entity>

      <!-- Invisible floor for collision to prevent falling through -->
      <a-plane
        id="collision-floor"
        position="0 0 0"
        rotation="-90 0 0"
        width="100"
        height="100"
        visible="false"
        static-body="mass: 0"
      ></a-plane>
    </a-scene>
  </body>
</html>
